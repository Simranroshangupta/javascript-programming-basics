<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!--
==========================================
Project : Todo App

A simple application to
add, complete and delete
daily tasks.

==========================================
-->

<div class="container">

    <h1>Todo App</h1>

    <div class="input-box">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task">

        <button id="addTask">
            Add
        </button>

    </div>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
